tools:
    external_code_coverage:
        timeout: 300
build:
    nodes:
        analysis:
            environment:
                variables:
                  OPENSSL_CFLAGS: "-I/usr/local/opt/openssl/include"
                  OPENSSL_LIBS: "-L/usr/local/opt/openssl/lib -lssl -lcrypto"
            tests:
                override:
                    - php-scrutinizer-run
