name: Tests

on:
  push:
    branches:
      - master

  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      XDEBUG_MODE: coverage

    steps:
    - uses: actions/checkout@v6

    - name: Lint PHP files
      run: |
        shopt -s globstar
        php -l src/**/*.php tests/**/*.php

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v5
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Install dependencies
      if: steps.composer-cache.outputs.cache-hit != 'true'
      run: composer install --prefer-dist --no-progress

    - name: Run test suite with coverage
      run: php vendor/bin/phpunit --coverage-clover coverage.clover.xml --coverage-text

    - name: Upload coverage to Scrutinizer
      run: |
        curl \
          --fail \
          --silent \
          --show-error \
          --request POST \
          --form "coverage=@coverage.clover.xml" \
          --form "format=php-clover" \
          --form "revision=${GITHUB_SHA}" \
          "https://scrutinizer-ci.com/coverage/upload"
